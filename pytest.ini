[pytest]
# Configuración de pytest para el proyecto

# Directorio raíz del proyecto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configuración de pytest-django
DJANGO_SETTINGS_MODULE = clinica_veterinaria.settings

# Marcadores personalizados
markers =
    django_db: marca las pruebas que requieren acceso a la base de datos
    slow: marca las pruebas que tardan mucho en ejecutarse
    integration: marca las pruebas de integración

# Opciones de salida
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings

# Rutas de prueba
testpaths = usuarios/tests

# Configuración de cobertura
[coverage:run]
source = usuarios
omit = 
    */migrations/*
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

